name: Weekly Company Sync

on:
  schedule:
    - cron: "0 6 * * 1"  # 11 PM Sunday Arizona = 6 AM Monday UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - run: npm ci

      - run: npx tsx scripts/sync-company-lists.ts
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      - name: Commit updated company lists
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/crawler/sources/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: weekly company list sync"
            git push
          fi
